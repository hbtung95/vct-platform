name: Vercel Deploy Gate

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: vercel-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Pre-Deploy Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Gate 1: Authz Contract ──────────────────────────────
      - name: "Gate 1/6: Authz Contract"
        run: npm run authz:check

      # ── Gate 2: TypeScript ──────────────────────────────────
      - name: "Gate 2/6: TypeScript Typecheck"
        run: npx tsc -p tsconfig.json --noEmit

      # ── Gate 3: ESLint ──────────────────────────────────────
      - name: "Gate 3/6: ESLint"
        run: npm run lint

      # ── Gate 4: Architecture Boundaries ─────────────────────
      - name: "Gate 4/6: Architecture Boundaries"
        run: npm run lint:boundaries

      # ── Gate 5: Unit Tests ──────────────────────────────────
      - name: "Gate 5/6: Unit Tests"
        run: npm run test

      # ── Gate 6: Production Build ────────────────────────────
      - name: "Gate 6/6: Production Build"
        run: npm run build
